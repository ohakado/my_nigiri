<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>握り詰め - 詰将棋作成ゲーム</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
  <script src="https://unpkg.com/htmx.org@2.0.0" defer></script>
</head>
<body>
  <div class="app-container">
    <header>
      <h1>握り詰め</h1>
      <p>ランダムに配られた駒を全て使って詰将棋を作ろう（最大9手）</p>
      <nav>
        <a href="/">作成</a>
        <a href="/ranking">ランキング</a>
      </nav>
    </header>

    <!-- ========== ゲーム画面 ========== -->
    <div id="game-screen">

      <!-- 情報バー -->
      <div class="game-info-bar">
        <span id="remaining-label" class="remaining-label"></span>
        <div style="display:flex; gap:8px;">
          <button id="reroll-pieces-btn" class="small-btn">🀄 握り直す</button>
          <button id="reroll-btn" class="small-btn">🎲 玉を再配置</button>
        </div>
      </div>

      <!-- ゲームエリア -->
      <div class="game-area">

        <!-- 駒箱（ランダム駒プール） -->
        <div id="piece-box">
          <h3>駒箱</h3>
          <div id="piece-box-pieces"></div>
          <p id="pool-remaining-label" class="pool-label"></p>
          <hr style="border-color:#a08040; margin: 8px 0;">
          <p class="piece-box-hint">
            🔴数字＝残り枚数<br>
            クリックで選択→盤面へ<br>
            配置後クリックで状態循環:<br>
            <span style="color:#ffdd88;">先手→成→後手→成→先手…</span><br>
            右クリックで手駒に戻す
          </p>
        </div>

        <!-- 将棋盤 -->
        <div class="board-wrapper">
          <div class="file-labels">
            <div class="file-label">9</div>
            <div class="file-label">8</div>
            <div class="file-label">7</div>
            <div class="file-label">6</div>
            <div class="file-label">5</div>
            <div class="file-label">4</div>
            <div class="file-label">3</div>
            <div class="file-label">2</div>
            <div class="file-label">1</div>
          </div>
          <div class="board-with-ranks">
            <div class="rank-labels">
              <div class="rank-label">一</div>
              <div class="rank-label">二</div>
              <div class="rank-label">三</div>
              <div class="rank-label">四</div>
              <div class="rank-label">五</div>
              <div class="rank-label">六</div>
              <div class="rank-label">七</div>
              <div class="rank-label">八</div>
              <div class="rank-label">九</div>
            </div>
            <div id="board"></div>
          </div>
        </div>

        <!-- 右パネル：後手の駒台（上）＋ 先手の駒台（下） -->
        <div class="right-panel">

          <!-- △ 後手の駒台 -->
          <div id="defender-hand">
            <h3>△ 後手の駒台</h3>
            <div id="defender-hand-pieces"></div>
            <p id="defender-hand-empty" class="piece-box-hint" style="color:#aaa;">なし</p>
            <hr style="border-color:#a08040; margin: 8px 0;">
            <p class="piece-box-hint">
              クリックで選択→盤面へ<br>
              右クリックで駒箱に戻す
            </p>
          </div>

          <!-- ▲ 先手の駒台 -->
          <div id="attacker-hand">
            <h3>▲ 先手の駒台</h3>
            <div id="attacker-hand-pieces"></div>
            <p id="attacker-hand-empty" class="piece-box-hint" style="color:#aaa;">なし</p>
            <hr style="border-color:#a08040; margin: 8px 0;">
            <p class="piece-box-hint">
              クリックで選択→盤面へ<br>
              右クリックで駒箱に戻す
            </p>
          </div>

        </div><!-- /right-panel -->

      </div><!-- /game-area -->

      <!-- 操作エリア -->
      <div class="controls">
        <button id="solve-btn">🔍 詰みを確認</button>
        <button id="clear-btn">🗑 盤面リセット</button>
      </div>

      <div id="solve-status"></div>
      <div id="solution-display"></div>

      <!-- 投稿フォーム -->
      <div class="submit-form">
        <form id="submit-form"
              hx-post="/api/submit"
              hx-target="#result-area"
              hx-swap="innerHTML">
          <label for="player-name">投稿者名（任意）</label>
          <input type="text" id="player-name" name="player_name" placeholder="匿名" maxlength="20">
          <input type="hidden" id="input-board-sfen" name="board_sfen">
          <input type="hidden" id="input-solution-moves" name="solution_moves">
          <input type="hidden" id="input-moves-count" name="moves_count">
          <input type="hidden" id="input-tier" name="tier" value="1">
          <button type="submit" id="submit-btn" disabled>📮 投稿する</button>
        </form>
      </div>

      <div id="result-area"></div>

    </div><!-- /game-screen -->
  </div>

  <script type="module" src="/static/js/board_ui.js"></script>
</body>
</html>
